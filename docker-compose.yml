services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: aistock-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/ai_stock.sql:/docker-entrypoint-initdb.d/01_ai_stock.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aistock

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    container_name: aistock-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_DIALECT: mysql
      DB_DRIVER: mysqlconnector
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: ${APP_DEBUG:-false}
      TUSHARE_ENABLED: ${TUSHARE_ENABLED:-false}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\""]
      interval: 15s
      timeout: 8s
      retries: 10
    networks:
      - aistock

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
    container_name: aistock-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aistock

volumes:
  mysql_data:

networks:
  aistock:
